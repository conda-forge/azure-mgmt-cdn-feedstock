schema_version: 1

context:
  name: azure-mgmt-cdn
  version: 12.0.0

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/azure-mgmt-cdn-${{ version }}.zip
  sha256: b7c3ee2189234b4af51ace2924927c5fd733f3de748a642d6d5040067c8c9ddd

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - setuptools
    - python ${{ python_min }}.*
    - pip
  run:
    - python >=${{ python_min }}
    - azure-common >=1.1,<2.0
    - azure-mgmt-core >=1.3.0,<2.0
    - msrest >=0.6.21

tests:
  - python:
      imports:
        - azure.mgmt.cdn
        - azure.mgmt.cdn.aio
      pip_check: true
      python_version: ${{ python_min }}.*
about:
  summary: Microsoft Azure CDN Management Client Library for Python
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/Azure/azure-sdk-for-python

extra:
  recipe-maintainers:
    - janjagusch
